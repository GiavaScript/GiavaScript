name: Nightly Crystal CI

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: nightly

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: shards install

      - name: Verify reference docs are up to date
        run: |
          python scripts/generate_reference.py
          git diff --exit-code -- reference/REFERENCE.md

      - name: Run tests
        run: crystal spec

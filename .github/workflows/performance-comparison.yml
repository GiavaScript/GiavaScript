name: Performance Comparison

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 28-31 * *"

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check whether today is the last day
        id: last_day
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$(date -u -d '+1 day' +%d)" == "01" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip non-last-day scheduled run
        if: steps.last_day.outputs.run != 'true'
        run: echo "Not the last day of the month. Skipping benchmark."

      - name: Install Crystal
        if: steps.last_day.outputs.run == 'true'
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.19.1

      - name: Install dependencies
        if: steps.last_day.outputs.run == 'true'
        run: shards install

      - name: Build GiavaScript interpreter
        if: steps.last_day.outputs.run == 'true'
        run: mkdir -p bin && crystal build src/giavascript_cli.cr -o bin/giavascript

      - name: Install NVM and Node versions
        if: steps.last_day.outputs.run == 'true'
        id: node
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"

          nvm install --lts
          nvm install 0.12.18

          echo "lts_version=$(nvm version lts/*)" >> "$GITHUB_OUTPUT"

      - name: Benchmark and generate markdown report
        if: steps.last_day.outputs.run == 'true'
        id: report
        shell: bash
        env:
          LTS_VERSION: ${{ steps.node.outputs.lts_version }}
        run: |
          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"

          bubble_giavascript_seconds=$(python3 scripts/benchmark_avg.py "./bin/giavascript examples/bubbleSort.js" --runs 20)
          bubble_node_lts_seconds=$(python3 scripts/benchmark_avg.py "source '$NVM_DIR/nvm.sh' && nvm exec '$LTS_VERSION' node examples/bubbleSort.js" --runs 20)
          bubble_node_012_seconds=$(python3 scripts/benchmark_avg.py "source '$NVM_DIR/nvm.sh' && nvm exec 0.12.18 node examples/bubbleSort.js" --runs 20)

          matrix_giavascript_seconds=$(python3 scripts/benchmark_avg.py "./bin/giavascript examples/matrixMultiply.js" --runs 20)
          matrix_node_lts_seconds=$(python3 scripts/benchmark_avg.py "source '$NVM_DIR/nvm.sh' && nvm exec '$LTS_VERSION' node examples/matrixMultiply.js" --runs 20)
          matrix_node_012_seconds=$(python3 scripts/benchmark_avg.py "source '$NVM_DIR/nvm.sh' && nvm exec 0.12.18 node examples/matrixMultiply.js" --runs 20)

          report_date=$(date -u +'%d-%m-%Y')
          report_file="reports/performance-comparison-${report_date}.md"

          mkdir -p reports
          cat > "$report_file" <<EOF
          # Performance comparison - ${report_date}

          Average execution time over 20 runs across GiavaScript and Node.js runtimes.

          | Script | GiavaScript (s) | Node LTS ${LTS_VERSION} (s) | Node 0.12.18 (s) |
          | --- | ---: | ---: | ---: |
          | \`examples/bubbleSort.js\` | ${bubble_giavascript_seconds} | ${bubble_node_lts_seconds} | ${bubble_node_012_seconds} |
          | \`examples/matrixMultiply.js\` | ${matrix_giavascript_seconds} | ${matrix_node_lts_seconds} | ${matrix_node_012_seconds} |
          EOF

          echo "report_file=$report_file" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        if: steps.last_day.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: performance-comparison-report
          path: ${{ steps.report.outputs.report_file }}

      - name: Add report to workflow summary
        if: steps.last_day.outputs.run == 'true'
        shell: bash
        run: cat "${{ steps.report.outputs.report_file }}" >> "$GITHUB_STEP_SUMMARY"

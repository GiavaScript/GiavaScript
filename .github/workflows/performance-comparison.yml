name: Performance Comparison

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 28-31 * *"

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check whether today is the last day
        id: last_day
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$(date -u -d '+1 day' +%d)" == "01" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip non-last-day scheduled run
        if: steps.last_day.outputs.run != 'true'
        run: echo "Not the last day of the month. Skipping benchmark."

      - name: Install Crystal
        if: steps.last_day.outputs.run == 'true'
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.19.1

      - name: Install dependencies
        if: steps.last_day.outputs.run == 'true'
        run: shards install

      - name: Build GiavaScript interpreter
        if: steps.last_day.outputs.run == 'true'
        run: |
          mkdir -p bin
          crystal build src/giavascript_cli.cr \
            --release \
            --no-debug \
            --mcpu=native \
            -o bin/giavascript
          strip bin/giavascript || true

          if ! ./bin/giavascript examples/stringSlicing.js >/dev/null 2>&1; then
            echo "Native build failed on runner CPU. Rebuilding without --mcpu=native."
            crystal build src/giavascript_cli.cr \
              --release \
              --no-debug \
              -o bin/giavascript
            strip bin/giavascript || true
            ./bin/giavascript examples/stringSlicing.js >/dev/null
          fi

      - name: Install NVM and Node versions
        if: steps.last_day.outputs.run == 'true'
        id: node
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"

          nvm install --lts
          nvm install 0.12.18

          echo "lts_version=$(nvm version lts/*)" >> "$GITHUB_OUTPUT"
          echo "node_lts_bin=$(nvm which lts/*)" >> "$GITHUB_OUTPUT"
          echo "node_012_bin=$(nvm which 0.12.18)" >> "$GITHUB_OUTPUT"

      - name: Benchmark and generate CSV report
        if: steps.last_day.outputs.run == 'true'
        id: report
        shell: bash
        env:
          LTS_VERSION: ${{ steps.node.outputs.lts_version }}
          NODE_LTS_BIN: ${{ steps.node.outputs.node_lts_bin }}
          NODE_012_BIN: ${{ steps.node.outputs.node_012_bin }}
        run: |
          BENCH_RUNS=30
          BENCH_WARMUP=5
          BENCH_STAT=mean

          read bubble_giavascript_avg < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do ./bin/giavascript examples/bubbleSort.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")
          read bubble_node_lts_avg < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do '$NODE_LTS_BIN' examples/bubbleSort.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")
          read bubble_node_012_avg < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do '$NODE_012_BIN' examples/bubbleSort.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")

          read matrix_giavascript_avg < <(python3 scripts/benchmark_avg.py "./bin/giavascript examples/matrixMultiply.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")
          read matrix_node_lts_avg < <(python3 scripts/benchmark_avg.py "'$NODE_LTS_BIN' examples/matrixMultiply.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")
          read matrix_node_012_avg < <(python3 scripts/benchmark_avg.py "'$NODE_012_BIN' examples/matrixMultiply.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")

          read bst_giavascript_avg < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do ./bin/giavascript examples/binarySearchTree.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")
          read bst_node_lts_avg < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do '$NODE_LTS_BIN' examples/binarySearchTree.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")
          read bst_node_012_avg < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do '$NODE_012_BIN' examples/binarySearchTree.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")

          read slicing_giavascript_avg < <(python3 scripts/benchmark_avg.py "./bin/giavascript examples/stringSlicing.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")
          read slicing_node_lts_avg < <(python3 scripts/benchmark_avg.py "'$NODE_LTS_BIN' examples/stringSlicing.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")
          read slicing_node_012_avg < <(python3 scripts/benchmark_avg.py "'$NODE_012_BIN' examples/stringSlicing.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")

          read sieve_giavascript_avg < <(python3 scripts/benchmark_avg.py "./bin/giavascript examples/sievePrimes.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")
          read sieve_node_lts_avg < <(python3 scripts/benchmark_avg.py "'$NODE_LTS_BIN' examples/sievePrimes.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")
          read sieve_node_012_avg < <(python3 scripts/benchmark_avg.py "'$NODE_012_BIN' examples/sievePrimes.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stat "$BENCH_STAT")

          report_date=$(date -u +'%d-%m-%Y')
          benchmark_dir="benchmarks"
          report_file="${benchmark_dir}/performance-comparison-${report_date}.csv"
          latest_report_file="${benchmark_dir}/performance-comparison-latest.csv"

          mkdir -p "$benchmark_dir"
          cat > "$report_file" <<EOF
          date,script,giavascript_avg_s,node_lts_version,node_lts_avg_s,node_0_12_18_avg_s
          ${report_date},Bubble sort,${bubble_giavascript_avg},${LTS_VERSION},${bubble_node_lts_avg},${bubble_node_012_avg}
          ${report_date},Matrix multiplication,${matrix_giavascript_avg},${LTS_VERSION},${matrix_node_lts_avg},${matrix_node_012_avg}
          ${report_date},Binary search tree,${bst_giavascript_avg},${LTS_VERSION},${bst_node_lts_avg},${bst_node_012_avg}
          ${report_date},String slicing,${slicing_giavascript_avg},${LTS_VERSION},${slicing_node_lts_avg},${slicing_node_012_avg}
          ${report_date},Sieve primes,${sieve_giavascript_avg},${LTS_VERSION},${sieve_node_lts_avg},${sieve_node_012_avg}
          EOF

          cp "$report_file" "$latest_report_file"

          echo "report_file=$report_file" >> "$GITHUB_OUTPUT"
          echo "latest_report_file=$latest_report_file" >> "$GITHUB_OUTPUT"

      - name: Update README benchmark section
        if: steps.last_day.outputs.run == 'true'
        shell: bash
        env:
          LTS_VERSION: ${{ steps.node.outputs.lts_version }}
          REPORT_FILE: ${{ steps.report.outputs.report_file }}
        run: |
          python3 - <<'PY'
          import csv
          import os
          import textwrap
          from pathlib import Path

          readme_path = Path("README.md")
          content = readme_path.read_text(encoding="utf-8")

          with open(os.environ["REPORT_FILE"], newline="", encoding="utf-8") as csvfile:
              rows = list(csv.DictReader(csvfile))

          def fmt(value):
              return f"{value:.6f}".rstrip("0").rstrip(".")

          charts = []
          for row in rows:
              script_name = row["script"]
              giavascript_avg = float(row["giavascript_avg_s"])
              node_lts_avg = float(row["node_lts_avg_s"])
              node_012_avg = float(row["node_0_12_18_avg_s"])
              chart_values = [giavascript_avg, node_lts_avg, node_012_avg]

              max_value = max(chart_values)
              y_max = max_value * 1.1
              giavascript_label = f"GiavaScript ({fmt(giavascript_avg)}s)"
              node_lts_label = f"Node LTS ({fmt(node_lts_avg)}s)"
              node_012_label = f"Node 0.12.18 ({fmt(node_012_avg)}s)"

              charts.append(
                  textwrap.dedent(
                      f"""\
                      ### {script_name}

                      ```mermaid
                      %%{{init: {{"themeVariables": {{"xyChart": {{"plotColorPalette": "#4a4a4a, #2e7d32, #d4b000"}}}}}}}}%%
                      xychart-beta
                          title \"{script_name} Average Runtime\"
                          x-axis [\"{giavascript_label}\", \"{node_lts_label}\", \"{node_012_label}\"]
                          y-axis \"Seconds\" 0 --> {fmt(y_max)}
                          bar [{fmt(giavascript_avg)}, -1, -1]
                          bar [-1, {fmt(node_lts_avg)}, -1]
                          bar [-1, -1, {fmt(node_012_avg)}]
                      ```
                      """
                  ).strip()
              )

          section = textwrap.dedent(
              f"""\
              ## Benchmarks

              Monthly benchmark results are committed to `benchmarks/performance-comparison-latest.csv` by the GitHub Actions workflow. Each chart compares average runtime for a single algorithm (lower is better).

              {chr(10).join(charts)}

              - `GiavaScript` bars use dark gray (`#4a4a4a`)
              - `Node LTS` bars use green (`#2e7d32`) for {os.environ['LTS_VERSION']}
              - `Node 0.12.18` bars use yellow (`#d4b000`)
              """
          ).strip()

          start = content.find("## Benchmarks")
          if start == -1:
              updated = content.rstrip() + "\n\n" + section + "\n"
          else:
              next_heading = content.find("\n## ", start + 1)
              if next_heading == -1:
                  updated = content[:start].rstrip() + "\n\n" + section + "\n"
              else:
                  updated = content[:start].rstrip() + "\n\n" + section + "\n\n" + content[next_heading + 1 :].lstrip()

          readme_path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit benchmark CSV to repository
        if: steps.last_day.outputs.run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add benchmarks/*.csv README.md

          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
            exit 0
          fi

          git commit -m "chore: update benchmark results"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Add report to workflow summary
        if: steps.last_day.outputs.run == 'true'
        shell: bash
        env:
          LTS_VERSION: ${{ steps.node.outputs.lts_version }}
          REPORT_FILE: ${{ steps.report.outputs.report_file }}
        run: |
          python3 - <<'PY'
          import csv
          import os

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          report_file = os.environ["REPORT_FILE"]
          latest_report_file = "${{ steps.report.outputs.latest_report_file }}"
          lts_version = os.environ["LTS_VERSION"]

          with open(report_file, newline="", encoding="utf-8") as csvfile:
              rows = list(csv.DictReader(csvfile))

          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Performance comparison\n\n")
              summary.write(f"CSV report committed to `{latest_report_file}`.\n\n")
              summary.write(
                  f"| Script | GiavaScript average (s) | Node LTS {lts_version} average (s) | Node 0.12.18 average (s) |\n"
              )
              summary.write("| --- | ---: | ---: | ---: |\n")

              for row in rows:
                  summary.write(
                      f"| `{row['script']}` | {row['giavascript_avg_s']} | {row['node_lts_avg_s']} | {row['node_0_12_18_avg_s']} |\n"
                  )
          PY

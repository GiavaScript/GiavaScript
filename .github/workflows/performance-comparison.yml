name: Performance Comparison

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 28-31 * *"

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check whether today is the last day
        id: last_day
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$(date -u -d '+1 day' +%d)" == "01" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip non-last-day scheduled run
        if: steps.last_day.outputs.run != 'true'
        run: echo "Not the last day of the month. Skipping benchmark."

      - name: Install Crystal
        if: steps.last_day.outputs.run == 'true'
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.19.1

      - name: Install dependencies
        if: steps.last_day.outputs.run == 'true'
        run: shards install

      - name: Build GiavaScript interpreter
        if: steps.last_day.outputs.run == 'true'
        run: mkdir -p bin && crystal build src/giavascript_cli.cr -o bin/giavascript

      - name: Install NVM and Node versions
        if: steps.last_day.outputs.run == 'true'
        id: node
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"

          nvm install --lts
          nvm install 0.12.18

          echo "lts_version=$(nvm version lts/*)" >> "$GITHUB_OUTPUT"
          echo "node_lts_bin=$(nvm which lts/*)" >> "$GITHUB_OUTPUT"
          echo "node_012_bin=$(nvm which 0.12.18)" >> "$GITHUB_OUTPUT"

      - name: Benchmark and generate markdown report
        if: steps.last_day.outputs.run == 'true'
        id: report
        shell: bash
        env:
          LTS_VERSION: ${{ steps.node.outputs.lts_version }}
          NODE_LTS_BIN: ${{ steps.node.outputs.node_lts_bin }}
          NODE_012_BIN: ${{ steps.node.outputs.node_012_bin }}
        run: |
          BENCH_RUNS=30
          BENCH_WARMUP=5
          BENCH_STATS=median,p95

          read bubble_giavascript_median bubble_giavascript_p95 < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do ./bin/giavascript examples/bubbleSort.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")
          read bubble_node_lts_median bubble_node_lts_p95 < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do '$NODE_LTS_BIN' examples/bubbleSort.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")
          read bubble_node_012_median bubble_node_012_p95 < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do '$NODE_012_BIN' examples/bubbleSort.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")

          read matrix_giavascript_median matrix_giavascript_p95 < <(python3 scripts/benchmark_avg.py "./bin/giavascript examples/matrixMultiply.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")
          read matrix_node_lts_median matrix_node_lts_p95 < <(python3 scripts/benchmark_avg.py "'$NODE_LTS_BIN' examples/matrixMultiply.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")
          read matrix_node_012_median matrix_node_012_p95 < <(python3 scripts/benchmark_avg.py "'$NODE_012_BIN' examples/matrixMultiply.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")

          read bst_giavascript_median bst_giavascript_p95 < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do ./bin/giavascript examples/binarySearchTree.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")
          read bst_node_lts_median bst_node_lts_p95 < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do '$NODE_LTS_BIN' examples/binarySearchTree.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")
          read bst_node_012_median bst_node_012_p95 < <(python3 scripts/benchmark_avg.py "for _ in \$(seq 1 25); do '$NODE_012_BIN' examples/binarySearchTree.js; done" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")

          read slicing_giavascript_median slicing_giavascript_p95 < <(python3 scripts/benchmark_avg.py "./bin/giavascript examples/stringSlicing.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")
          read slicing_node_lts_median slicing_node_lts_p95 < <(python3 scripts/benchmark_avg.py "'$NODE_LTS_BIN' examples/stringSlicing.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")
          read slicing_node_012_median slicing_node_012_p95 < <(python3 scripts/benchmark_avg.py "'$NODE_012_BIN' examples/stringSlicing.js" --runs "$BENCH_RUNS" --warmup "$BENCH_WARMUP" --stats "$BENCH_STATS")

          report_date=$(date -u +'%d-%m-%Y')
          report_file="reports/performance-comparison-${report_date}.md"

          mkdir -p reports
          cat > "$report_file" <<EOF
          # Performance comparison - ${report_date}

          Median and p95 execution time in seconds (${BENCH_RUNS} timed runs, ${BENCH_WARMUP} warmups).

          | Script | GiavaScript median (s) | GiavaScript p95 (s) | Node LTS ${LTS_VERSION} median (s) | Node LTS ${LTS_VERSION} p95 (s) | Node 0.12.18 median (s) | Node 0.12.18 p95 (s) |
          | --- | ---: | ---: | ---: | ---: | ---: | ---: |
          | \`examples/bubbleSort.js\` (x25/run) | ${bubble_giavascript_median} | ${bubble_giavascript_p95} | ${bubble_node_lts_median} | ${bubble_node_lts_p95} | ${bubble_node_012_median} | ${bubble_node_012_p95} |
          | \`examples/matrixMultiply.js\` | ${matrix_giavascript_median} | ${matrix_giavascript_p95} | ${matrix_node_lts_median} | ${matrix_node_lts_p95} | ${matrix_node_012_median} | ${matrix_node_012_p95} |
          | \`examples/binarySearchTree.js\` (x25/run) | ${bst_giavascript_median} | ${bst_giavascript_p95} | ${bst_node_lts_median} | ${bst_node_lts_p95} | ${bst_node_012_median} | ${bst_node_012_p95} |
          | \`examples/stringSlicing.js\` | ${slicing_giavascript_median} | ${slicing_giavascript_p95} | ${slicing_node_lts_median} | ${slicing_node_lts_p95} | ${slicing_node_012_median} | ${slicing_node_012_p95} |
          EOF

          echo "report_file=$report_file" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        if: steps.last_day.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: performance-comparison-report
          path: ${{ steps.report.outputs.report_file }}

      - name: Add report to workflow summary
        if: steps.last_day.outputs.run == 'true'
        shell: bash
        run: cat "${{ steps.report.outputs.report_file }}" >> "$GITHUB_STEP_SUMMARY"
